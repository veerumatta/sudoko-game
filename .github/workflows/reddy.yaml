name: 🚀 Build & Push Docker to ECR

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3️⃣ Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4️⃣ Build Docker image
      - name: Build Docker Image
        run: |
          IMAGE_TAG=$(date +%s)
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          docker build -t sudoku-app:$IMAGE_TAG .

      # 5️⃣ Trivy security scan
      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: sudoku-app:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # 6️⃣ Tag & Push Docker image to ECR
      - name: Tag & Push Image
        run: |
          # Fetch AWS account ID dynamically
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          # Construct ECR image URI
          IMAGE_URI="$ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"

          # Tag and push the image
          docker tag sudoku-app:${{ env.IMAGE_TAG }} $IMAGE_URI
          docker push $IMAGE_URI

          # Print info for later steps
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "AWS_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      # 7️⃣ Output pushed image info
      - name: Output pushed image info
        run: |
          echo "Docker image pushed: $IMAGE_URI"
          echo "AWS Account ID: $AWS_ACCOUNT_ID"
